  /* wax seal at the flap tip */
  .env-seal {
    position: absolute; left: 50%; top: 50%;

  <!-- full-page envelope -->
  <div id="envelopeWrap">

              transform="rotate(-22 24 32)" opacity="0"/>

<script>
  // inject text
  const $ = id => document.getElementById(id);

  // gentle falling petals/leaves
  (function makePetals(){
    const layer = document.getElementById("petals");
    if (!layer) return;
    const glyphs = ["❀","✿","❁","🍃","✾"];
    const N = 9;
    for (let i=0;i<N;i++){
      const s = document.createElement("span");
      s.className = "petal";
      s.textContent = glyphs[i % glyphs.length];
      const dur = 9 + Math.random()*8;
      s.style.left = (Math.random()*100) + "%";
      s.style.fontSize = (12 + Math.random()*10) + "px";
      s.style.animationDuration = dur + "s";
      s.style.animationDelay = (-Math.random()*dur) + "s";
      // green leaves vs gold flowers
      s.style.color = (i % 2 === 0) ? "var(--green-soft)" : "var(--gold)";
      layer.appendChild(s);
    }
  })();
  $("hint").textContent       = INVITE.tapHint;
  $("c-bismillah").textContent= INVITE.bismillahAr;
  $("c-eyebrow").textContent  = INVITE.eyebrow;
  $("c-intro").textContent    = INVITE.intro;
  $("c-name1").textContent    = INVITE.name1;
  $("c-amp").textContent      = INVITE.ampersand;
  $("c-name2").textContent    = INVITE.name2;
  $("c-date").textContent     = INVITE.date;
  $("c-time").textContent     = INVITE.time;
  $("c-venue").textContent    = INVITE.venue;
  $("c-closing").textContent  = INVITE.closing;
  $("c-family").textContent   = INVITE.family;

  const stage = $("stage");
  const wrap  = $("envelopeWrap");
  const canvas= $("fx");
  const ctx   = canvas.getContext("2d");

  function size() {
    canvas.width  = stage.clientWidth;
    canvas.height = stage.clientHeight;
  }
  size(); window.addEventListener("resize", size);

  /* ---------- firecracker particle system ---------- */
  let particles = [];
  const GOLD = ["#E3C878","#C9A24B","#FFFFFF","#3E9E73","#1F6B4A","#F4E3A8","#6CE0A8"];

  function burst(x, y) {
    const n = 46 + Math.floor(Math.random()*24);
    for (let i=0;i<n;i++){
      const a = Math.random()*Math.PI*2;
      const sp = 2 + Math.random()*5.5;
      particles.push({
        x, y,
        vx: Math.cos(a)*sp,
        vy: Math.sin(a)*sp,
        life: 1,
        decay: 0.012 + Math.random()*0.02,
        color: GOLD[(Math.random()*GOLD.length)|0],
        size: 1.5 + Math.random()*2.5
      });
    }
  }

  function rocket(x, y, delay) {
    setTimeout(() => burst(x, y), delay);
  }

  let raf;
  function loop() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.globalCompositeOperation = "lighter";
    for (let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.045;          // gravity
      p.vx *= 0.985; p.vy *= 0.985;
      p.life -= p.decay;
      if (p.life <= 0){ particles.splice(i,1); continue; }
      ctx.globalAlpha = Math.max(p.life,0);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size*p.life+0.4,0,Math.PI*2);
      ctx.fill();
      // sparkle trail
      ctx.globalAlpha = p.life*0.4;
      ctx.fillRect(p.x-p.vx, p.y-p.vy, 1.2, 1.2);
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = "source-over";
    raf = requestAnimationFrame(loop);
  }
  loop();

  function celebrate() {
    const W = canvas.width, H = canvas.height;
    // sequence of bursts
    rocket(W*0.5,  H*0.42, 0);
    rocket(W*0.25, H*0.30, 250);
    rocket(W*0.75, H*0.32, 450);
    rocket(W*0.18, H*0.55, 750);
    rocket(W*0.82, H*0.55, 950);
    rocket(W*0.5,  H*0.20, 1200);
    rocket(W*0.4,  H*0.6,  1600);
    rocket(W*0.62, H*0.5,  1900);
    // gentle ongoing celebration
    let count = 0;
    const iv = setInterval(()=>{
      burst(W*(0.2+Math.random()*0.6), H*(0.2+Math.random()*0.45));
      if (++count > 6) clearInterval(iv);
    }, 1400);
    stage._iv = iv;
  }

  function open() {
    if (stage.classList.contains("open")) return;
    stage.classList.add("open");
    setTimeout(celebrate, 350);
  }
  function reset() {
    stage.classList.remove("open");
    clearInterval(stage._iv);
    particles = [];
  }

  // flow: doodle scene -> envelope -> invite
  function goToEnvelope() {
    stage.classList.add("stage2");
  }

  function restartDoodle() {
    reset();
    stage.classList.remove("stage2");
    // reliably restart finished CSS animations by re-inserting the node
    const old = $("doodle");
    const fresh = old.cloneNode(true);
    old.parentNode.replaceChild(fresh, old);
  }

  // event delegation: survives node replacement on replay
  stage.addEventListener("click", (e) => {
    if (e.target.closest("#toEnvelope")) goToEnvelope();
  });
  wrap.addEventListener("click", open);
  $("replay").addEventListener("click", restartDoodle);

</script>
